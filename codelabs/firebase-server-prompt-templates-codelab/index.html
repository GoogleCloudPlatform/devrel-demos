<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Rugged Terrain Guide | Outdoor Excellence</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Roboto+Condensed:wght@400;700&amp;family=Inter:wght@400;600&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "terrain-olive": "#4B5320",
            "terrain-orange": "#D35400",
            "terrain-blue": "#1B4F72",
            "terrain-earth": "#2C3E50",
            "background-rugged": "#EAE7DC",
          },
          fontFamily: {
            "display": ["Archivo Black", "sans-serif"],
            "condensed": ["Roboto Condensed", "sans-serif"],
            "body": ["Inter", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
            h1, h2, h3 { @apply font-display uppercase tracking-tight; }
            body { @apply font-body bg-background-rugged text-terrain-earth; }
        }
        .map-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .adventure-card:hover .card-overlay {
            opacity: 1;
        }
    </style>
</head>

<body class="antialiased selection:bg-terrain-orange selection:text-white">
  <div id="app-layout" class="relative flex min-h-screen flex-col overflow-x-hidden">
    <!-- Header will be injected by main.ts -->
    <main id="app-content" class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex flex-col gap-16">
      <!-- Content will be injected by main.ts -->
    </main>
    <!-- Footer will be injected by main.ts -->
    <!-- Chat Widget will be injected here -->
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
