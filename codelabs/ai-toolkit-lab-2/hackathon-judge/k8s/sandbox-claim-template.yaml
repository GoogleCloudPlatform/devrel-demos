apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: sandbox-hackathon-judge-template
  namespace: hackathon-judge
spec:
  podTemplate:
    metadata:
      labels:
        app: sandbox
      annotations:
        test: "yes"
    spec:
      runtimeClassName: gvisor
      serviceAccountName: hackathon-judge-sandbox-sa
      containers:
      - name: hackathon-judge
        image: "${ARTIFACT_REGISTRY_LOCATION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${ARTIFACT_REPO_NAME}/agent-sandbox:$COMMIT_SHA"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: $GOOGLE_CLOUD_PROJECT
        - name: GOOGLE_CLOUD_LOCATION
          value: "global"
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "true"
        - name: SANDBOX_DIR
          value: "/home/sandbox/app"
        resources:
          limits:
            memory: "4Gi"
            cpu: "2000m"
          requests:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30