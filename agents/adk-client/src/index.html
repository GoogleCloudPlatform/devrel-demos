<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADK Agent Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="adk-chat-client-logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" integrity="sha256-Pn59f+s+XVjLbIBPaKtcJMx+XrYnD9bly7kSRzkhfQw=" crossorigin="anonymous"></script>
    <!-- DOMPurify for XSS protection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js" integrity="sha256-QigBQMy2be3IqJD2ezKJUJ5gycSmyYlRHj2VGBuITpU=" crossorigin="anonymous"></script>
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css" integrity="sha256-Oppd74ucMR5a5Dq96FxjEzGF7tTw2fZ/6ksAqDCM8GY=" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js" integrity="sha256-nxnOvB1EQa4fD/xpakJii5+GX+XZne2h8ejNW+yHiIg=" crossorigin="anonymous"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-theme">
    <div class="app-container">
        <div id="app-loading" class="loading-overlay">
            <div class="loading-content">
                <svg class="spinner large" viewBox="0 0 50 50">
                    <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                </svg>
                <div class="loading-text">Loading Agent...</div>
            </div>
        </div>
        <header class="app-header">
            <div class="logo-container">
                <img src="https://adk.dev/assets/agent-development-kit.png" alt="ADK Logo" class="logo-icon">
                <h1>ADK Agent</h1>
            </div>
            <div class="app-info" id="app-info">
                <div class="app-title" id="app-title"></div>
                <div class="app-desc" id="app-desc"></div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-button" title="Toggle dark/light mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div class="content-area">
            <aside class="sidebar">
                <button id="new-session-button" class="new-session-btn">
                    <i class="fas fa-plus"></i> New Session
                </button>
                <div class="session-list" id="session-list">
                    <!-- Sessions will appear here -->
                </div>
            </aside>
            <div class="chat-area">
                <main class="chat-container">
                    <div id="message-list" class="message-list">
                        <!-- Messages will appear here -->
                        <div class="message system-message">
                            <div class="message-content">
                                How can I help you today?
                            </div>
                        </div>
                    </div>
                </main>

                <footer class="app-footer">
                    <div class="input-container">
                        <div class="attachment-preview" id="attachment-preview" style="display: none;">
                            <div class="preview-item">
                                <img id="preview-img" src="" alt="Preview" style="display: none;">
                                <video id="preview-vid" src="" style="display: none;"></video>
                                <button id="remove-attachment" class="remove-button"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <div class="input-row">
                            <div id="input-status-indicator" class="input-status-indicator"></div>
                            <label for="file-upload" class="icon-button attachment-button" title="Attach image or video">
                                <i class="fas fa-paperclip"></i>
                                <input type="file" id="file-upload" accept="image/*,video/*" style="display: none;">
                            </label>
                            <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
                            <button id="send-button" class="icon-button send-button" title="Send message">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                            <button id="stop-button" class="icon-button stop-button hidden" title="Stop generation">
                                <i class="fas fa-stop"></i>
                            </button>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
