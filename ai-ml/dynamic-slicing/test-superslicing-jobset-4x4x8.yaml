apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: test-superslicing-jobset-4x4x8
  namespace: llm-d-pd-disaggregation
  labels:
    kueue.x-k8s.io/queue-name: lq
spec:
  replicatedJobs:
    - name: worker
      replicas: 1
      template:
        spec:
          parallelism: 32
          completions: 32
          completionMode: Indexed
          template:
            metadata:
              annotations:
                cloud.google.com/gke-tpu-slice-topology: "4x4x8"
            spec:
              tolerations:
              - effect: NoSchedule
                key: google.com/tpu
                operator: Exists
              nodeSelector:
                cloud.google.com/gke-tpu-accelerator: tpu7x
              restartPolicy: Never
              containers:
              - name: tpu-container
                image: us-docker.pkg.dev/cloud-tpu-images/jax-ai-image/tpu:latest
                command: ["sh", "-c"]
                args:
                - |
                  echo "=== Worker $RESOURCE_NAME (Index $JOB_COMPLETION_INDEX) Starting ==="
                  python3 -u << 'EOF'
                  import os
                  import sys
                  import time
                  
                  print("Checking VFIO devices...")
                  try:
                      if os.path.exists("/dev/vfio"):
                          vfio_devices = os.listdir("/dev/vfio")
                          print("Found /dev/vfio content:", vfio_devices)
                      else:
                          print("/dev/vfio does not exist!")
                  except Exception as e:
                      print("Error checking /dev/vfio:", e)
                  
                  print("Initializing JAX distributed...")
                  try:
                      import jax
                      
                      print("TPU env vars:")
                      for k, v in os.environ.items():
                          if "TPU" in k or "JOB" in k or "WORKER" in k:
                              print(f"  {k}: {v}")
                              
                      jax.distributed.initialize()
                      print("JAX distributed initialized successfully.")
                      print("Local devices count:", len(jax.local_devices()))
                      print("Global devices count (total TensorCores in slice):", len(jax.devices()))
                      # 4x4x8 topology has 128 chips, 2 TensorCores per chip = 256 devices.
                      if len(jax.devices()) != 256:
                          print(f"ERROR: Expected 256 global devices, got {len(jax.devices())}")
                          sys.exit(1)
                      print("SUCCESS: JAX initialized correctly!")
                  except Exception as e:
                      print("Error JAX:", e)
                      sys.exit(1)
                  EOF
                resources:
                  limits:
                    google.com/tpu: 4
                  requests:
                    google.com/tpu: 4
