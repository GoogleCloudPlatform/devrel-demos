apiVersion: batch/v1
kind: Job
metadata:
  name: test-superslicing-job-4x4x8
  namespace: llm-d-pd-disaggregation
  labels:
    kueue.x-k8s.io/queue-name: lq
spec:
  parallelism: 32
  completions: 32
  completionMode: Indexed
  template:
    metadata:
      annotations:
        cloud.google.com/gke-tpu-slice-topology: "4x4x8"
    spec:
      subdomain: test-superslicing-job-4x4x8-svc
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu7x
        cloud.google.com/gke-tpu-topology: 4x4x8
      tolerations:
      - effect: NoSchedule
        key: google.com/tpu
        operator: Exists
      restartPolicy: Never
      containers:
      - name: tpu-container
        image: python:3.10
        command: ["sh", "-c"]
        args:
        - |
          echo "=== Worker $RESOURCE_NAME (Index $JOB_COMPLETION_INDEX) Starting ==="
          python3 -u << 'EOF'
          import os
          import sys
          import time
          
          print("Checking TPU devices...")
          try:
              devices = [f"/dev/{d}" for d in os.listdir("/dev") if d.startswith("accel")]
              print("Found devices:", devices)
              if len(devices) != 4:
                  print(f"ERROR: Expected 4 devices, got {len(devices)}")
                  sys.exit(1)
          except Exception as e:
              print("Error checking devices:", e)
              sys.exit(1)
          
          print("Installing JAX...")
          os.system("pip install --upgrade pip >/dev/null")
          os.system("pip install 'jax[tpu]' -f https://storage.googleapis.com/jax-releases/libtpu_releases.html >/dev/null")
          
          print("Initializing JAX distributed...")
          try:
              import jax
              # GKE should inject TPU_WORKER_ID, TPU_WORKER_HOSTNAMES, etc.
              # jax.distributed.initialize() should auto-detect them.
              jax.distributed.initialize()
              print("JAX distributed initialized successfully.")
              print("Local devices count:", len(jax.local_devices()))
              print("Global devices count (total chips in slice):", len(jax.devices()))
              # Expected global devices count: 128 for 4x4x8
              if len(jax.devices()) != 128:
                  print(f"ERROR: Expected 128 global devices, got {len(jax.devices())}")
                  sys.exit(1)
              print("SUCCESS: JAX initialized correctly!")
          except Exception as e:
              print("Error JAX:", e)
              sys.exit(1)
          EOF
        resources:
          limits:
            google.com/tpu: 4
          requests:
            google.com/tpu: 4
---
apiVersion: v1
kind: Service
metadata:
  name: test-superslicing-job-4x4x8-svc
  namespace: llm-d-pd-disaggregation
spec:
  clusterIP: None
  selector:
    batch.kubernetes.io/job-name: test-superslicing-job-4x4x8
